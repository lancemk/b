name: Deploy React 19 via gh-pages script

on:
  push:
    branches: ['master']
  workflow_dispatch:

# IMPORTANT: We need write access to contents to allow 'gh-pages' to push to the branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Git Identity
        # The 'gh-pages' script needs a git user to commit the build folder
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Execute Deploy Script
        # This runs 'pre-deploy' (build) then 'deploy' (gh-pages -d dist)
        run: pnpm run deploy
        env:
          # If your vite.config.ts uses env vars for the base path or API keys
          VITE_APP_BASE: '/alias/'